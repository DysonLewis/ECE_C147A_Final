# @package _global_
# cnn_transformer_ctc: Custom 1-D CNN frontend + Transformer backend → CTC
#
# Transformer attends globally over all time steps, unlike RNNs which process
# sequentially. Pre-LN (norm_first=True) used for training stability — critical
# since CTC loss starts near ~170 before the model learns any structure.
# Single Transformer layer with dim_feedforward=768 (1x d_model) to match the
# ~5.3M parameter budget; increase to 2 layers or larger ff if compute allows.
#
# Parameter budget (target ~5.3M):
#   SpectrogramNorm + MLP + head              :  0.482M
#   CNNEncoder (C=96, K=31, L=4)              :  1.292M
#   TransformerEncoder (d=768, ff=768, L=1)   :  3.547M
#   Total                                     :  ~5.321M
module:
  _target_: emg2qwerty.lightning.FlexibleCTCModule
  in_features: 528
  mlp_features: [384]
  frontend:
    _target_: emg2qwerty.modules.CNNEncoder
    num_features: 768
    cnn_channels: 96
    cnn_kernel_size: 31
    num_cnn_layers: 4
    dropout: 0.1
  backend:
    _target_: emg2qwerty.modules.TransformerEncoder
    d_model: 768        # must equal num_features
    nhead: 8            # head_dim = 768/8 = 96
    num_layers: 1       # 1 layer to stay within budget; increase if compute allows
    dim_feedforward: 768   # 1× d_model (vs typical 4×) to stay within budget
    dropout: 0.1

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding: [1800, 200]

optimizer:
  _target_: torch.optim.Adam
  lr: 0.001

lr_scheduler:
  scheduler:
    _target_: pl_bolts.optimizers.lr_scheduler.LinearWarmupCosineAnnealingLR
    warmup_epochs: 10
    max_epochs: ${trainer.max_epochs}
    warmup_start_lr: 1.0e-08
    eta_min: 1.0e-06
  interval: epoch

decoder:
  _target_: emg2qwerty.decoder.CTCGreedyDecoder

seed: 1501
batch_size: 32
num_workers: 4
train: true
monitor_metric: val/CER
monitor_mode: min

trainer:
  accelerator: gpu
  devices: 1
  num_nodes: 1
  max_epochs: 150
  default_root_dir: ${hydra:runtime.output_dir}
  # BUG FIX: gradient clipping was missing entirely.
  # Without it, RNN/GRU/LSTM models explode in the first few batches
  # (loss ~170 -> collapses to ~3.5 = log(num_classes), i.e. uniform output).
  # Clipping by L2 norm at 1.0 is the standard fix for recurrent networks
  # and also prevents occasional gradient spikes in the CNN-only baseline.
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm

callbacks:
  - _target_: pytorch_lightning.callbacks.LearningRateMonitor
  - _target_: pytorch_lightning.callbacks.ModelCheckpoint
    dirpath: ${hydra:runtime.output_dir}/checkpoints
    monitor: ${monitor_metric}
    mode: ${monitor_mode}
    save_last: true
    verbose: true
