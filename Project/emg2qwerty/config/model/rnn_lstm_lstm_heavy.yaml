# @package _global_
# rnn_lstm_lstm_heavy: LSTM-heavy variant of rnn_lstm_ctc
#
# Shifts the parameter budget toward the LSTM backend. A minimal single-layer
# RNN frontend does light sequential preprocessing; the LSTM gets most of the
# capacity. Tests whether long-range memory (LSTM cell state) is the primary
# driver of performance in a fully recurrent architecture, with the RNN acting
# as little more than a feature normalizer before the LSTM.
#
# Parameter budget (target ~5.1M):
#   SpectrogramNorm + MLP + head   :  0.482M
#   RNNEncoder (h=128, L=1, bidir) :  0.429M
#   LSTMEncoder (h=264, L=2, bidir):  4.264M
#   Total                          :  ~5.175M
module:
  _target_: emg2qwerty.lightning.FlexibleCTCModule
  in_features: 528
  mlp_features: [384]
  frontend:
    _target_: emg2qwerty.modules.RNNEncoder
    input_size: 768
    hidden_size: 128    # bidir: 128*2=256 → proj to 768
    num_layers: 1
    dropout: 0.0        # no inter-layer dropout for a single-layer RNN
    bidirectional: true
  backend:
    _target_: emg2qwerty.modules.LSTMEncoder
    input_size: 768
    hidden_size: 264    # bidir: 264*2=528 → proj to 768
    num_layers: 2
    dropout: 0.1
    bidirectional: true

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding: [1800, 200]

optimizer:
  _target_: torch.optim.Adam
  lr: 0.001

lr_scheduler:
  scheduler:
    _target_: pl_bolts.optimizers.lr_scheduler.LinearWarmupCosineAnnealingLR
    warmup_epochs: 10
    max_epochs: ${trainer.max_epochs}
    warmup_start_lr: 1.0e-08
    eta_min: 1.0e-06
  interval: epoch

decoder:
  _target_: emg2qwerty.decoder.CTCGreedyDecoder

seed: 1501
batch_size: 32
num_workers: 4
train: true
monitor_metric: val/CER
monitor_mode: min

trainer:
  accelerator: gpu
  devices: 1
  num_nodes: 1
  max_epochs: 150
  default_root_dir: ${hydra:runtime.output_dir}
  # BUG FIX: gradient clipping was missing entirely.
  # Without it, RNN/GRU/LSTM models explode in the first few batches
  # (loss ~170 -> collapses to ~3.5 = log(num_classes), i.e. uniform output).
  # Clipping by L2 norm at 1.0 is the standard fix for recurrent networks
  # and also prevents occasional gradient spikes in the CNN-only baseline.
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm

callbacks:
  - _target_: pytorch_lightning.callbacks.LearningRateMonitor
  - _target_: pytorch_lightning.callbacks.ModelCheckpoint
    dirpath: ${hydra:runtime.output_dir}/checkpoints
    monitor: ${monitor_metric}
    mode: ${monitor_mode}
    save_last: true
    verbose: true
